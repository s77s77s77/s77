<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Premium S77</title>

<link rel="icon" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<style>
body{
  font-family:Arial,sans-serif;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}
.panel{
  max-width:480px;
  margin:15px auto;
}
.hidden{display:none;}
input,button,select{
  padding:10px;
  border-radius:8px;
  border:none;
}
button{
  background:maroon;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.inputs{
  display:grid;
  grid-template-columns:repeat(4,70px);
  gap:10px;
  justify-content:center;
}
.inputs input{
  width:70px;
  height:70px;
  font-size:34px;
  font-weight:bold;
  text-align:center;
  border:4px solid red;
  background:white;
  color:black;
}
.inputs input:first-child{background:#7fd3ff;}
.nuevo-cuadrado{
  width:70px;
  height:70px;
  font-size:34px;
  border:4px solid red;
  background:#7fd3ff;
}
.favoritos,.explosivos{
  width:220px;
  min-height:60px;
  margin:0 auto;
  font-weight:bold;
  border:4px solid white;
}
.favoritos{background:green;font-size:26px;}
.explosivos{background:red;font-size:48px;}
</style>
</head>

<body>

<h1>🎡 Sistema Premium S77</h1>

<!-- LOGIN -->
<div class="panel" id="loginPanel">
  <h2>INGRESAR CLAVE</h2>
  <input id="claveInput" placeholder="Clave">
  <br><br>
  <button onclick="ingresar()">Ingresar</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN -->
<div class="panel hidden" id="adminPanel">
  <h2>ADMINISTRADOR</h2>
  <input id="nuevaClave" placeholder="Clave usuario">
  <select id="duracion">
    <option value="1">1 día</option>
    <option value="7">7 días</option>
    <option value="30">30 días</option>
  </select>
  <br><br>
  <button onclick="crearUsuario()">Crear usuario</button>
  <div id="listaUsuarios"></div>
</div>

<!-- SISTEMA -->
<div class="panel hidden" id="s77">
  <h2>ÚLTIMOS 16</h2>
  <div class="inputs">
    <input disabled><input disabled><input disabled><input disabled>
    <input disabled><input disabled><input disabled><input disabled>
    <input disabled><input disabled><input disabled><input disabled>
    <input disabled><input disabled><input disabled><input disabled>
  </div>

  <h3>NUEVO</h3>
  <input id="nuevoNumero" type="number" class="nuevo-cuadrado">
  <br><br>
  <button id="reiniciar">REINICIAR</button>

  <h3>FAVORITOS</h3>
  <div class="favoritos" id="favoritos">—</div>

  <h3>EXPLOSIVOS</h3>
  <div class="explosivos" id="explosivos">—</div>
</div>

<script>
// ===== SEGURIDAD =====
const ADMIN="ADMIN-1407";
let usuarios=JSON.parse(localStorage.getItem("usuarios")||"{}");

function ingresar(){
  const clave=document.getElementById("claveInput").value;
  const ahora=Date.now();

  if(clave===ADMIN){
    mostrar(true);
    return;
  }
  if(!usuarios[clave]) return error("Clave inválida");
  if(ahora>usuarios[clave]) return error("Acceso vencido");

  mostrar(false);
}

function mostrar(esAdmin){
  document.getElementById("loginPanel").classList.add("hidden");
  document.getElementById("s77").classList.remove("hidden");
  if(esAdmin){
    document.getElementById("adminPanel").classList.remove("hidden");
    renderUsuarios();
  }
}

function error(t){document.getElementById("error").innerText=t;}

function crearUsuario(){
  const c=nuevaClave.value;
  const d=duracion.value;
  if(!c) return;
  usuarios[c]=Date.now()+d*86400000;
  localStorage.setItem("usuarios",JSON.stringify(usuarios));
  nuevaClave.value="";
  renderUsuarios();
}

function renderUsuarios(){
  listaUsuarios.innerHTML=Object.entries(usuarios)
    .filter(u=>u[1]>Date.now())
    .map(u=>`<p>${u[0]}</p>`).join("")||"—";
}

// ===== S77 =====
const lotes3=[[0,13,28],[1,18,36],[2,10,35]];
const lotes4=[[3,18,24,26]];

const cas=[...document.querySelectorAll(".inputs input")];
let ultimos=[];

nuevoNumero.onchange=()=>{
  let v=parseInt(nuevoNumero.value);
  if(isNaN(v)) return;
  ultimos.unshift(v);
  if(ultimos.length>16) ultimos.pop();
  render(); calcular();
  nuevoNumero.value="";
};

reiniciar.onclick=()=>{
  ultimos=[];
  render();
  favoritos.innerText="—";
  explosivos.innerText="—";
};

function render(){
  cas.forEach((c,i)=>c.value=ultimos[i]??"");
}

function calcular(){
  let cnt={};
  const sumar=n=>cnt[n]=(cnt[n]||0)+1;

  lotes3.forEach(l=>{
    let p=l.filter(n=>ultimos.includes(n));
    if(p.length===2 && p.some(n=>ultimos.indexOf(n)<8))
      sumar(l.find(n=>!p.includes(n)));
  });

  lotes4.forEach(l=>{
    let p=l.filter(n=>ultimos.includes(n));
    if(p.length===2 && p.some(n=>ultimos.indexOf(n)<8))
      l.filter(n=>!p.includes(n)).forEach(sumar);
  });

  let f=[],e=[];
  for(let n in cnt) cnt[n]>1?e.push(n):f.push(n);
  favoritos.innerText=f.join(", ")||"—";
  explosivos.innerText=e.join(", ")||"—";
}
</script>

</body>
</html>
